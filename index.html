<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Brothrone Travel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 배경과 전체적인 스타일 */
        body { 
            background-color: #f8f9fa; 
            display: flex; 
            flex-direction: column; /* 푸터를 아래로 보내기 위해 변경 */
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
        }

        /* 중앙 카드 스타일 */
        .card { 
            background: white; 
            width: 320px; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            text-align: center; 
            margin-top: 50px;
        }

        /* 사진 스타일 */
        img { 
            width: 150px; height: 150px; 
            object-fit: cover; 
            border-radius: 50%; 
            margin-bottom: 20px; 
            border: 3px solid #007aff; 
        }

        h1 { font-size: 24px; color: #333; margin: 10px 0; }
        p { color: #666; font-size: 16px; }

        /* 푸터 스타일 */
        .footer {
            background-color: #333;
            color: #fff;
            padding: 40px 0;
            margin-top: 50px;
            width: 100%;
            text-align: center;
        }

        .social-links {
            margin: 20px 0;
        }

        /* 아이콘 공통 스타일 */
        .social-icon {
            color: #fff;
            font-size: 24px; /* 로고 크기 */
            margin: 0 15px;
            text-decoration: none;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px; /* 아이콘과 글자 간격 */
        }

        /* 마우스 올렸을 때 인스타그램 색상 */
        .social-icon:hover .fa-instagram { color: #E1306C; }
        /* 마우스 올렸을 때 깃허브 색상 */
        .social-icon:hover .fa-github { color: #4078c0; }

        .copyright {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="sapporo.jpeg" alt="sapporo"> 
        <h1>항공게이들아 👋</h1>
        <p>계산기</p>

        <a href="satellite_EPS_calculator.html" style="
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007aff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        ">바로가기</a>
    </div>

    <footer class="footer">
        <div class="social-links">
            <a href="https://instagram.com/본인아이디" target="_blank" class="social-icon">
                <i class="fab fa-instagram"></i>
                <span style="font-size: 14px;">Instagram</span>
            </a>
            <a href="https://github.com/brothrone" target="_blank" class="social-icon">
                <i class="fab fa-github"></i>
                <span style="font-size: 14px;">GitHub</span>
            </a>
        </div>
        <p class="copyright">© 2026 brothrone. All rights reserved.</p>
    </footer>

</body>
</html>
